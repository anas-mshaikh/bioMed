<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 560" role="img" aria-labelledby="title desc">
  <title id="title">PET biological pathway</title>
  <desc id="desc">Scientific pathway from PET polymer to PETase, MHET intermediate, MHETase, and final monomers TPA and EG.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f2238"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1520" height="560" fill="url(#bg)"/>
  <text x="70" y="78" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">PET biological pathway</text>
  <text x="70" y="118" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="22">A concrete biology story: polymer → enzyme action → intermediate → product</text>

  <g filter="url(#shadow)" font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 210)">
      <rect width="220" height="150" rx="28" fill="#11263f" stroke="#29415f"/>
      <text x="110" y="62" fill="#f8fafc" font-size="28" font-weight="800" text-anchor="middle">PET polymer</text>
      <text x="110" y="96" fill="#cbd5e1" font-size="18" text-anchor="middle">substrate chain</text>
      <text x="110" y="126" fill="#60a5fa" font-size="16" text-anchor="middle">plastic starting point</text>
    </g>
    <line x1="300" y1="286" x2="424" y2="286" stroke="url(#flow)" stroke-width="8" marker-end="url(#arrow)"/>

    <g transform="translate(430 182)">
      <circle cx="0" cy="104" r="72" fill="#2dd4bf" opacity="0.18"/>
      <rect x="-78" y="42" width="156" height="124" rx="28" fill="#0b1726" stroke="#2dd4bf"/>
      <text x="0" y="86" fill="#f8fafc" font-size="28" font-weight="800" text-anchor="middle">PETase</text>
      <text x="0" y="118" fill="#cbd5e1" font-size="18" text-anchor="middle">cuts PET</text>
    </g>
    <line x1="564" y1="286" x2="688" y2="286" stroke="url(#flow)" stroke-width="8" marker-end="url(#arrow)"/>

    <g transform="translate(694 210)">
      <rect width="220" height="150" rx="28" fill="#11263f" stroke="#29415f"/>
      <text x="110" y="62" fill="#f8fafc" font-size="28" font-weight="800" text-anchor="middle">MHET</text>
      <text x="110" y="96" fill="#cbd5e1" font-size="18" text-anchor="middle">intermediate</text>
      <text x="110" y="126" fill="#f59e0b" font-size="16" text-anchor="middle">still needs processing</text>
    </g>
    <line x1="924" y1="286" x2="1048" y2="286" stroke="url(#flow)" stroke-width="8" marker-end="url(#arrow)"/>

    <g transform="translate(1054 182)">
      <circle cx="0" cy="104" r="72" fill="#f59e0b" opacity="0.18"/>
      <rect x="-86" y="42" width="172" height="124" rx="28" fill="#0b1726" stroke="#f59e0b"/>
      <text x="0" y="86" fill="#f8fafc" font-size="28" font-weight="800" text-anchor="middle">MHETase</text>
      <text x="0" y="118" fill="#cbd5e1" font-size="18" text-anchor="middle">finishes cleavage</text>
    </g>
    <line x1="1188" y1="286" x2="1310" y2="286" stroke="url(#flow)" stroke-width="8" marker-end="url(#arrow)"/>

    <g transform="translate(1316 210)">
      <rect width="134" height="150" rx="28" fill="#11263f" stroke="#29415f"/>
      <text x="67" y="58" fill="#f8fafc" font-size="24" font-weight="800" text-anchor="middle">TPA</text>
      <text x="67" y="90" fill="#cbd5e1" font-size="18" text-anchor="middle">+</text>
      <text x="67" y="122" fill="#f8fafc" font-size="24" font-weight="800" text-anchor="middle">EG</text>
    </g>
  </g>
</svg>
