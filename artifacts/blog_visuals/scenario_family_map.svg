<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Scenario family map</title>
  <desc id="desc">Four scenario cards showing high crystallinity, contamination artifact, cocktail synergy, and no-go episode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#10243c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1400" height="720" fill="url(#bg)"/>
  <text x="70" y="84" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">Scenario family map</text>
  <text x="70" y="124" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="22">A quick way to show judges that the benchmark has more than one kind of hard case</text>

  <g filter="url(#shadow)" font-family="Inter, system-ui, sans-serif">
    <g transform="translate(70 190)">
      <rect width="300" height="210" rx="28" fill="#0b1726" stroke="#2dd4bf"/>
      <text x="30" y="52" fill="#86efac" font-size="28" font-weight="800">High crystallinity</text>
      <text x="30" y="90" fill="#cbd5e1" font-size="18">The substrate is harder to access than it looks.</text>
      <circle cx="244" cy="138" r="40" fill="#2dd4bf" opacity="0.18"/>
      <path d="M210 138 h68" stroke="#2dd4bf" stroke-width="10" stroke-linecap="round"/>
      <path d="M244 104 v68" stroke="#2dd4bf" stroke-width="10" stroke-linecap="round"/>
    </g>
    <g transform="translate(390 190)">
      <rect width="300" height="210" rx="28" fill="#0b1726" stroke="#f59e0b"/>
      <text x="30" y="52" fill="#fde68a" font-size="28" font-weight="800">Contamination artifact</text>
      <text x="30" y="90" fill="#cbd5e1" font-size="18">The signal looks real, but the cause is misleading.</text>
      <circle cx="244" cy="136" r="44" fill="#f59e0b" opacity="0.18"/>
      <circle cx="226" cy="136" r="12" fill="#f59e0b"/>
      <circle cx="252" cy="120" r="8" fill="#f59e0b"/>
      <circle cx="264" cy="148" r="10" fill="#f59e0b"/>
    </g>
    <g transform="translate(710 190)">
      <rect width="300" height="210" rx="28" fill="#0b1726" stroke="#a78bfa"/>
      <text x="30" y="52" fill="#ddd6fe" font-size="28" font-weight="800">Cocktail synergy</text>
      <text x="30" y="90" fill="#cbd5e1" font-size="18">A combination route beats single-route assumptions.</text>
      <path d="M208 150 C230 110, 270 110, 290 150" fill="none" stroke="#a78bfa" stroke-width="10" stroke-linecap="round"/>
      <path d="M208 150 C230 186, 270 186, 290 150" fill="none" stroke="#a78bfa" stroke-width="10" stroke-linecap="round"/>
    </g>
    <g transform="translate(1030 190)">
      <rect width="300" height="210" rx="28" fill="#0b1726" stroke="#ef4444"/>
      <text x="30" y="52" fill="#fecaca" font-size="28" font-weight="800">No-go episode</text>
      <text x="30" y="90" fill="#cbd5e1" font-size="18">The best decision is to stop, not to keep spending.</text>
      <path d="M214 106 l60 60" stroke="#ef4444" stroke-width="12" stroke-linecap="round"/>
      <path d="M274 106 l-60 60" stroke="#ef4444" stroke-width="12" stroke-linecap="round"/>
    </g>
  </g>
</svg>
