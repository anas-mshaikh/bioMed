<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">BioMed environment loop</title>
  <desc id="desc">Loop diagram showing reset, state, observe, choose action, run assay or consult, receive reward, update belief, and decide next step.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0d2338"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="72" y="84" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">Environment loop</text>
  <text x="72" y="124" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="22">observe → choose action → run assay / inspect / consult → reward → update belief → decide next step</text>

  <g filter="url(#shadow)" font-family="Inter, system-ui, sans-serif">
    <g transform="translate(90 210)">
      <rect width="220" height="110" rx="26" fill="#11263f" stroke="#29415f"/>
      <text x="110" y="45" fill="#f8fafc" font-size="30" font-weight="800" text-anchor="middle">reset()</text>
      <text x="110" y="76" fill="#cbd5e1" font-size="18" text-anchor="middle">start a new episode</text>
    </g>
    <line x1="310" y1="265" x2="392" y2="265" stroke="#7dd3fc" stroke-width="7" marker-end="url(#arrow)"/>

    <g transform="translate(400 210)">
      <rect width="220" height="110" rx="26" fill="#0b1726" stroke="#2dd4bf"/>
      <text x="110" y="45" fill="#f8fafc" font-size="30" font-weight="800" text-anchor="middle">state()</text>
      <text x="110" y="76" fill="#cbd5e1" font-size="18" text-anchor="middle">see the public snapshot</text>
    </g>
    <line x1="620" y1="265" x2="720" y2="265" stroke="#7dd3fc" stroke-width="7" marker-end="url(#arrow)"/>

    <g transform="translate(728 210)">
      <rect width="220" height="110" rx="26" fill="#11263f" stroke="#29415f"/>
      <text x="110" y="45" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle">observe</text>
      <text x="110" y="76" fill="#cbd5e1" font-size="18" text-anchor="middle">read what is visible</text>
    </g>
    <line x1="948" y1="265" x2="1026" y2="265" stroke="#7dd3fc" stroke-width="7" marker-end="url(#arrow)"/>

    <g transform="translate(1034 210)">
      <rect width="220" height="110" rx="26" fill="#11263f" stroke="#60a5fa"/>
      <text x="110" y="45" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle">choose action</text>
      <text x="110" y="76" fill="#cbd5e1" font-size="18" text-anchor="middle">pick a legal step</text>
    </g>

    <g transform="translate(1034 382)">
      <rect width="220" height="110" rx="26" fill="#0b1726" stroke="#f59e0b"/>
      <text x="110" y="45" fill="#f8fafc" font-size="24" font-weight="800" text-anchor="middle">run assay /</text>
      <text x="110" y="72" fill="#f8fafc" font-size="24" font-weight="800" text-anchor="middle">inspect / consult</text>
      <text x="110" y="94" fill="#cbd5e1" font-size="16" text-anchor="middle">step()</text>
    </g>
    <line x1="1144" y1="320" x2="1144" y2="372" stroke="#7dd3fc" stroke-width="7" marker-end="url(#arrow)"/>

    <g transform="translate(728 382)">
      <rect width="220" height="110" rx="26" fill="#11263f" stroke="#22c55e"/>
      <text x="110" y="45" fill="#f8fafc" font-size="28" font-weight="800" text-anchor="middle">reward</text>
      <text x="110" y="76" fill="#cbd5e1" font-size="18" text-anchor="middle">score the step</text>
    </g>
    <line x1="1034" y1="437" x2="948" y2="437" stroke="#7dd3fc" stroke-width="7" marker-end="url(#arrow)"/>

    <g transform="translate(400 382)">
      <rect width="220" height="110" rx="26" fill="#11263f" stroke="#a78bfa"/>
      <text x="110" y="45" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle">update belief</text>
      <text x="110" y="76" fill="#cbd5e1" font-size="18" text-anchor="middle">revise the plan</text>
    </g>
    <line x1="728" y1="437" x2="620" y2="437" stroke="#7dd3fc" stroke-width="7" marker-end="url(#arrow)"/>

    <g transform="translate(90 382)">
      <rect width="220" height="110" rx="26" fill="#11263f" stroke="#ef4444"/>
      <text x="110" y="45" fill="#f8fafc" font-size="24" font-weight="800" text-anchor="middle">decide next step</text>
      <text x="110" y="76" fill="#cbd5e1" font-size="18" text-anchor="middle">or end the episode</text>
    </g>
    <path d="M200 492 C90 610, 240 670, 420 642 C580 617, 670 562, 700 530" fill="none" stroke="#7dd3fc" stroke-width="7" marker-end="url(#arrow)"/>
    <path d="M310 210 C420 110, 650 84, 840 102 C995 116, 1110 164, 1144 210" fill="none" stroke="#2dd4bf" stroke-width="7" marker-end="url(#arrow)" opacity="0.75"/>

    <g transform="translate(1034 548)">
      <rect width="220" height="110" rx="26" fill="#0b1726" stroke="#64748b"/>
      <text x="110" y="45" fill="#f8fafc" font-size="24" font-weight="800" text-anchor="middle">legal next step</text>
      <text x="110" y="76" fill="#cbd5e1" font-size="18" text-anchor="middle">back to observe</text>
    </g>
  </g>
</svg>
