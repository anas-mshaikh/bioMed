<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">The scale of the plastic problem</title>
  <desc id="desc">Hero chart showing plastics produced, plastic waste, and end-of-life treatment shares based on OECD and UNEP figures.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0d2338"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1400" height="800" fill="url(#bg)"/>
  <circle cx="1210" cy="120" r="140" fill="#2dd4bf" opacity="0.08"/>
  <circle cx="165" cy="670" r="180" fill="#60a5fa" opacity="0.08"/>

  <text x="80" y="88" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800">The scale of the problem</text>
  <text x="80" y="128" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="22">OECD + UNEP figures for plastics produced, waste generated, and end-of-life treatment</text>

  <g transform="translate(80 180)" filter="url(#shadow)">
    <rect width="1240" height="470" rx="30" fill="#0b1726" stroke="#1f334d"/>
    <text x="38" y="54" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700">2019 snapshot</text>

    <g transform="translate(38 92)">
      <rect width="1164" height="54" rx="18" fill="#132235"/>
      <rect width="1164" height="54" rx="18" fill="none" stroke="#29415f"/>
      <rect width="1164" height="54" rx="18" fill="url(#accent)" opacity="0.16"/>
      <text x="22" y="34" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">460 Mt plastics produced</text>
      <text x="1090" y="34" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="20" text-anchor="end">global production</text>
    </g>

    <g transform="translate(38 176)">
      <rect width="1164" height="54" rx="18" fill="#132235"/>
      <rect width="893" height="54" rx="18" fill="#14b8a6"/>
      <text x="22" y="34" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700">353 Mt plastic waste</text>
      <text x="1090" y="34" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="20" text-anchor="end">waste stream</text>
    </g>

    <g transform="translate(38 270)">
      <text x="0" y="-12" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="18">How waste was handled</text>
      <rect width="1164" height="92" rx="24" fill="#132235" stroke="#29415f"/>
      <rect x="0" y="0" width="105" height="92" rx="24" fill="#22c55e"/>
      <rect x="105" y="0" width="588" height="92" fill="#64748b"/>
      <rect x="693" y="0" width="259" height="92" fill="#ef4444"/>
      <rect x="952" y="0" width="212" height="92" rx="24" fill="#f59e0b"/>
      <text x="52" y="38" fill="#07111f" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" text-anchor="middle">9%</text>
      <text x="52" y="64" fill="#07111f" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">recycled</text>
      <text x="399" y="38" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" text-anchor="middle">50%</text>
      <text x="399" y="64" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">landfilled</text>
      <text x="822" y="38" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" text-anchor="middle">22%</text>
      <text x="822" y="64" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">mismanaged</text>
      <text x="1068" y="38" fill="#07111f" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" text-anchor="middle">19%</text>
      <text x="1068" y="64" fill="#07111f" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">other routes</text>
    </g>

    <g transform="translate(38 414)">
      <rect width="364" height="86" rx="22" fill="#11263f" stroke="#29415f"/>
      <text x="22" y="34" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">460 Mt</text>
      <text x="22" y="61" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="18">plastics produced in 2019</text>
    </g>
    <g transform="translate(422 414)">
      <rect width="364" height="86" rx="22" fill="#11263f" stroke="#29415f"/>
      <text x="22" y="34" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">353 Mt</text>
      <text x="22" y="61" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="18">plastic waste generated</text>
    </g>
    <g transform="translate(806 414)">
      <rect width="396" height="86" rx="22" fill="#11263f" stroke="#29415f"/>
      <text x="22" y="34" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800">OECD + UNEP</text>
      <text x="22" y="61" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="18">benchmark figures, simplified for clarity</text>
    </g>
  </g>
</svg>
