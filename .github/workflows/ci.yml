name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit and integration tests
        run: python -m pytest tests/unit tests/integration -q

      - name: API and e2e tests
        run: python -m pytest tests/api tests/e2e -q

      - name: OpenEnv validate
        run: openenv validate

      - name: Docker smoke
        run: python -m pytest tests/e2e/test_docker_smoke.py -q
