<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BioMed Judge Cockpit</title>
    <link rel="stylesheet" href="/ui/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Truely Agentic</div>
          <h1>BioMed</h1>
        </div>
        <div class="controls">
          <label>Seed <input id="seed-input" type="number" value="7" /></label>
          <label
            >Scenario
            <select id="scenario-select"></select>
          </label>
          <label
            >Difficulty
            <select id="difficulty-select">
              <option value="easy">easy</option>
              <option value="medium">medium</option>
              <option value="hard">hard</option>
            </select>
          </label>
          <button id="reset-btn">Reset</button>
          <button id="step-btn">Step</button>
          <button id="run-demo-btn">Run Demo</button>
        </div>
      </header>

      <section id="banner" class="banner hidden"></section>

      <main class="grid">
        <aside class="column">
          <section class="section-card">
            <h2>Episode</h2>
            <div id="episode-summary" class="stack scroll-box"></div>
          </section>

          <section class="section-card">
            <h2>Selected Scenario</h2>
            <div id="scenario-info" class="scenario-info muted">Selected scenario will appear here.</div>
          </section>

          <section class="section-card">
            <h2>Pipeline</h2>
            <div id="pipeline" class="pipeline"></div>
          </section>
        </aside>

        <section class="column main">
          <section class="section-card">
            <h2>Action Builder</h2>
            <div class="builder">
              <label>
                Legal action
                <select id="action-select"></select>
              </label>
              <div id="action-form" class="action-form"></div>
            </div>
          </section>

          <section class="section-card">
            <h2>Timeline</h2>
            <div id="timeline" class="timeline"></div>
          </section>
        </section>

        <aside class="column">
          <section class="section-card">
            <h2>Reward</h2>
            <div class="metric-row">
              <div>
                <div class="metric-label">Step</div>
                <div id="step-reward" class="metric-value mono">—</div>
              </div>
              <div>
                <div class="metric-label">Cumulative</div>
                <div id="cum-reward" class="metric-value mono">—</div>
              </div>
            </div>
            <div id="reward-breakdown" class="bars"></div>
          </section>

          <section class="section-card">
            <h2>Latest Output</h2>
            <div id="latest-output" class="latest-output"></div>
          </section>

          <section class="section-card">
            <h2>Signals</h2>
            <div id="signal-block" class="stack"></div>
          </section>

          <section class="section-card">
            <h2>Review</h2>
            <pre id="judge-panel" class="judge-panel">
No debug snapshot.</pre
            >
          </section>
        </aside>
      </main>
    </div>

    <template id="timeline-item-template">
      <article class="timeline-item">
        <div class="timeline-item-head">
          <strong class="timeline-title"></strong>
          <span class="timeline-meta"></span>
        </div>
        <div class="timeline-body"></div>
      </article>
    </template>

    <script src="/ui/static/app.js"></script>
  </body>
</html>
